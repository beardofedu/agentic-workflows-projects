name: Sprint Impact Analysis

# Triggers:
#   1. Auto: when an issue is closed as "not planned" (cancelled)
#   2. Auto: when an issue's milestone is removed (rescheduled / delayed)
#   3. Manual: workflow_dispatch for live demos and testing
on:
  issues:
    types: [closed, demilestoned]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to analyze (treat as cancelled/delayed)"
        required: true
        type: number
      scenario:
        description: "Scenario type"
        required: true
        default: "cancelled"
        type: choice
        options:
          - cancelled
          - delayed

permissions:
  issues: write
  contents: read
  models: read

jobs:
  analyze-impact:
    name: Analyze Sprint Impact
    runs-on: ubuntu-latest

    # For issue events: only run if cancelled (not_planned) or demilestoned
    # workflow_dispatch always runs
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'closed' && github.event.issue.state_reason == 'not_planned') ||
      (github.event_name == 'issues' && github.event.action == 'demilestoned')

    steps:
      - name: Analyze downstream impact and notify blocked issues
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            // ── 1. Determine which issue triggered this run ──────────────────
            const isManual = context.eventName === 'workflow_dispatch';
            const issueNum = isManual
              ? parseInt(context.payload.inputs.issue_number)
              : context.payload.issue.number;
            const scenario = isManual
              ? context.payload.inputs.scenario
              : (context.payload.action === 'demilestoned' ? 'delayed' : 'cancelled');

            core.info(`Scenario: ${scenario} | Triggered issue: #${issueNum}`);

            // ── 2. Fetch the triggering issue ─────────────────────────────────
            const { data: triggerIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
            });

            // ── 3. Fetch all open issues ──────────────────────────────────────
            let allIssues = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
                page,
              });
              if (batch.length === 0) break;
              allIssues = allIssues.concat(batch);
              page++;
            }
            core.info(`Fetched ${allIssues.length} open issues`);

            // ── 4. Build reverse-dependency map from issue bodies ─────────────
            // Parses "## Depends On" sections and inline "- #N" references.
            function extractDependencies(body) {
              if (!body) return [];
              const deps = new Set();

              // Match the "## Depends On" section (up to next heading or end)
              const sectionMatch = body.match(
                /##\s*Depends\s+On\s*\n([\s\S]*?)(?=\n##|\n---|\s*$)/i
              );
              if (sectionMatch) {
                for (const m of sectionMatch[1].matchAll(/#(\d+)/g)) {
                  deps.add(parseInt(m[1]));
                }
              }
              return [...deps];
            }

            // dependents[N] = list of issue numbers that depend on N
            const dependents = {};
            for (const issue of allIssues) {
              for (const dep of extractDependencies(issue.body)) {
                if (!dependents[dep]) dependents[dep] = [];
                dependents[dep].push(issue.number);
              }
            }

            // ── 5. BFS to find ALL transitively impacted issues ───────────────
            function findAllImpacted(start) {
              const visited = new Set();
              const queue = [start];
              while (queue.length > 0) {
                const curr = queue.shift();
                if (visited.has(curr)) continue;
                visited.add(curr);
                for (const child of (dependents[curr] || [])) queue.push(child);
              }
              visited.delete(start); // exclude the trigger issue itself
              return [...visited].sort((a, b) => a - b);
            }

            const impactedNums = findAllImpacted(issueNum);
            core.info(`Impacted issues: ${impactedNums.join(', ') || 'none'}`);

            if (impactedNums.length === 0) {
              core.info('No downstream issues found — nothing to do.');
              await core.summary
                .addHeading(`Sprint Impact: #${issueNum}`)
                .addRaw(`No downstream issues depend on #${issueNum}. No action required.`)
                .write();
              return;
            }

            // Build rich details for impacted issues
            const impactedDetails = impactedNums.map((num) => {
              const issue = allIssues.find((i) => i.number === num);
              return issue
                ? {
                    number: num,
                    title: issue.title,
                    sprint: issue.milestone?.title ?? 'no sprint assigned',
                    labels: issue.labels.map((l) => l.name),
                    directlyBlocked: (dependents[issueNum] || []).includes(num),
                  }
                : { number: num, title: '(unknown)', sprint: '?', labels: [], directlyBlocked: false };
            });

            // ── 6. Generate AI impact summary via GitHub Models ───────────────
            const verb = scenario === 'cancelled' ? 'cancelled (closed as not planned)' : 'delayed (removed from its sprint)';
            const prompt = [
              `You are a sprint planning assistant for an engineering team.`,
              `Issue #${issueNum} "${triggerIssue.title}" has been ${verb}.`,
              ``,
              `The following issues are now potentially blocked (directly or transitively):`,
              impactedDetails
                .map(
                  (i) =>
                    `- #${i.number}: ${i.title} [${i.sprint}]${i.directlyBlocked ? ' (direct dependency)' : ' (transitive)'}`
                )
                .join('\n'),
              ``,
              `Write a concise sprint impact report (under 200 words, markdown) that:`,
              `1. States clearly which sprints are affected`,
              `2. Distinguishes direct vs transitive dependencies`,
              `3. Recommends 2-3 specific, actionable next steps for the team`,
              `4. Notes any impacted issues that might proceed independently`,
              `Be direct and actionable. Do not speculate beyond what is listed.`,
            ].join('\n');

            let aiSummary = '_AI summary unavailable — GitHub Models may not be enabled for this repo._';
            try {
              const res = await fetch(
                'https://models.inference.ai.azure.com/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o-mini',
                    messages: [{ role: 'user', content: prompt }],
                    max_tokens: 500,
                  }),
                }
              );
              if (res.ok) {
                const data = await res.json();
                aiSummary = data.choices?.[0]?.message?.content ?? aiSummary;
              } else {
                core.warning(`GitHub Models API returned ${res.status}: ${await res.text()}`);
              }
            } catch (err) {
              core.warning(`GitHub Models call failed: ${err.message}`);
            }

            // ── 7. Post idempotent comments on each impacted issue ────────────
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = `<!-- sprint-impact-bot:source-${issueNum} -->`;
            const emoji = scenario === 'cancelled' ? '🚫' : '📅';
            const actionWord = scenario === 'cancelled' ? 'cancelled' : 'delayed out of its sprint';

            for (const issue of impactedDetails) {
              // Idempotency: skip if we already commented for this source issue
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
              });
              if (comments.some((c) => c.body?.includes(marker))) {
                core.info(`Skipping #${issue.number} — already notified`);
                continue;
              }

              const depType = issue.directlyBlocked ? 'directly depends on' : 'is transitively blocked by';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  marker,
                  `## ${emoji} Sprint Impact Alert`,
                  ``,
                  `**#${issueNum} ${triggerIssue.title}** has been **${actionWord}**.`,
                  ``,
                  `This issue **${depType}** #${issueNum}. It may need to be **rescheduled or re-scoped** — please review with your team.`,
                  ``,
                  `<details>`,
                  `<summary>📊 Full Impact Report (all ${impactedDetails.length} affected issues)</summary>`,
                  ``,
                  aiSummary,
                  ``,
                  `**All issues affected:** ${impactedDetails.map((i) => `#${i.number}`).join(', ')}`,
                  `</details>`,
                  ``,
                  `> 🤖 Generated by the [Sprint Impact Analysis workflow](${runUrl}).`,
                ].join('\n'),
              });

              // Add 'blocked' label (best-effort — label must exist)
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['blocked'],
              }).catch((e) => core.debug(`Label add failed for #${issue.number}: ${e.message}`));

              core.info(`Notified #${issue.number}`);
            }

            // ── 8. Write workflow summary ─────────────────────────────────────
            await core.summary
              .addHeading(`Sprint Impact: #${issueNum} ${scenario}`)
              .addRaw(`**Trigger issue:** #${issueNum} — ${triggerIssue.title}\n\n`)
              .addTable([
                [
                  { data: 'Issue', header: true },
                  { data: 'Title', header: true },
                  { data: 'Sprint', header: true },
                  { data: 'Dependency', header: true },
                ],
                ...impactedDetails.map((i) => [
                  `#${i.number}`,
                  i.title,
                  i.sprint,
                  i.directlyBlocked ? '🔴 Direct' : '🟡 Transitive',
                ]),
              ])
              .addHeading('AI-Generated Impact Summary', 3)
              .addRaw(aiSummary)
              .write();
